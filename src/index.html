<!DOCTYPE html>
<html>
<head>
    <title>ESP32 MIDI Controller Settings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 5px; background-color: #f9f9f9; }
        h2 { color: #333; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], input[type="password"], select { width: calc(100% - 22px); padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-right: 10px; }
        button:hover { background-color: #0056b3; }
        .wifi-list { max-height: 150px; overflow-y: scroll; border: 1px solid #ddd; padding: 5px; margin-top: 10px; }
        .wifi-item { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; }
        .wifi-item:hover { background-color: #e9e9e9; }
        .wifi-item.selected { background-color: #d0e0ff; }
        .toggle-switch { position: relative; display: inline-block; width: 60px; height: 34px; margin-bottom: 10px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; -webkit-transition: .4s; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; -webkit-transition: .4s; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2196F3; }
        input:focus + .slider { box-shadow: 0 0 1px #2196F3; }
        input:checked + .slider:before { -webkit-transform: translateX(26px); -ms-transform: translateX(26px); transform: translateX(26px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>ESP32 MIDI Controller Settings</h1>

        <div class="section">
            <h2>WiFi Settings</h2>
            <label for="wifiEnable">Enable WiFi:</label>
            <label class="toggle-switch">
                <input type="checkbox" id="wifiEnable">
                <span class="slider"></span>
            </label>
            <label for="ssid">SSID:</label>
            <input type="text" id="ssid" placeholder="WiFi Network Name">
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="WiFi Password">
            <button onclick="scanWifi()">Scan Networks</button>
            <button onclick="connectWifi()">Connect</button>
            <button onclick="disconnectWifi()">Disconnect</button>
            <div class="wifi-list" id="wifiList"></div>
            <p>Status: <span id="wifiStatus"></span></p>
            <p>IP: <span id="wifiIp"></span></p>
        </div>

        <div class="section">
            <h2>Switch Settings</h2>
            <select id="switchSelect" onchange="loadSwitchSettings()">
                <option value="0">Switch 1</option>
                <option value="1">Switch 2</option>
                <option value="2">Switch 3 (UI)</option>
                <option value="3">Switch 4</option>
                <option value="4">Switch 5</option>
            </select>
            <label for="switchMode">Mode:</label>
            <select id="switchMode">
                <option value="momentary">Momentary</option>
                <option value="toggle">Toggle</option>
            </select>
            <label for="switchCc">CC Number:</label>
            <input type="number" id="switchCc" min="0" max="127">
            <label for="switchValue">Value (Momentary/On):</label>
            <input type="number" id="switchValue" min="0" max="127">
            <label for="switchAltValue">Alt Value (Toggle Off):</label>
            <input type="number" id="switchAltValue" min="0" max="127">
            <label for="switchChannel">Channel:</label>
            <input type="number" id="switchChannel" min="1" max="16">
        </div>

        <div class="section">
            <h2>Encoder Settings</h2>
            <select id="encoderSelect" onchange="loadEncoderSettings()">
                <option value="0">Encoder 1</option>
                <option value="1">Encoder 2</option>
                <option value="2">Encoder 3 (UI)</option>
                <option value="3">Encoder 4</option>
                <option value="4">Encoder 5</option>
            </select>
            <label for="encoderMode">Mode:</label>
            <select id="encoderMode">
                <option value="single">Single CC</option>
                <option value="range">Range CC</option>
            </select>

            <h3>Left/Decrement Action (Single Mode)</h3>
            <label for="encoderLeftCc">CC Number:</label>
            <input type="number" id="encoderLeftCc" min="0" max="127">
            <label for="encoderLeftVal">Value:</label>
            <input type="number" id="encoderLeftVal" min="0" max="127">
            <label for="encoderLeftCh">Channel:</label>
            <input type="number" id="encoderLeftCh" min="1" max="16">

            <h3>Right/Increment Action (Single Mode)</h3>
            <label for="encoderRightCc">CC Number:</label>
            <input type="number" id="encoderRightCc" min="0" max="127">
            <label for="encoderRightVal">Value:</label>
            <input type="number" id="encoderRightVal" min="0" max="127">
            <label for="encoderRightCh">Channel:</label>
            <input type="number" id="encoderRightCh" min="1" max="16">

            <h3>Range Mode Settings</h3>
            <label for="encoderRangeMin">Min Value:</label>
            <input type="number" id="encoderRangeMin" min="0" max="127">
            <label for="encoderRangeMax">Max Value:</label>
            <input type="number" id="encoderRangeMax" min="0" max="127">
            <label for="encoderCurrentValue">Current Value:</label>
            <input type="number" id="encoderCurrentValue" min="0" max="127" readonly>

            <h3>General Encoder Settings</h3>
            <label for="encoderSingleModeSteps">Single Mode Steps:</label>
            <input type="number" id="encoderSingleModeSteps" min="1" max="10">
            <label for="encoderAcceleration">Acceleration (ms, 0 for off):</label>
            <input type="number" id="encoderAcceleration" min="0" max="1000">
        </div>

        <button onclick="saveAllSettings()">Save All Settings</button>
        <button onclick="loadAllSettings()">Load All Settings (from device)</button>

    </div>

    <script>
        let currentSettings = {};

        async function fetchSettings() {
            const response = await fetch('/settings');
            currentSettings = await response.json();
            console.log("Fetched settings:", currentSettings);
            applySettingsToPage();
        }

        function applySettingsToPage() {
            // WiFi
            document.getElementById('wifiEnable').checked = currentSettings.wifi.enabled;
            document.getElementById('ssid').value = currentSettings.wifi.ssid;
            // Password is not fetched for security reasons
            document.getElementById('wifiStatus').innerText = getWifiStatusText(currentSettings.wifi.status);
            document.getElementById('wifiIp').innerText = currentSettings.wifi.ip || 'N/A';

            // Switches
            loadSwitchSettings();

            // Encoders
            loadEncoderSettings();
        }

        function getWifiStatusText(status) {
            switch (status) {
                case 0: return "Idle";
                case 1: return "No SSID Available";
                case 2: return "Scan Completed";
                case 3: return "Connected";
                case 4: return "Connection Failed";
                case 5: return "Connection Lost";
                case 6: return "Disconnected";
                default: return "Unknown";
            }
        }

        function loadSwitchSettings() {
            const index = document.getElementById('switchSelect').value;
            const setting = currentSettings.switchConfigs[index];
            if (setting) {
                document.getElementById('switchMode').value = setting.mode;
                document.getElementById('switchCc').value = setting.cc;
                document.getElementById('switchValue').value = setting.val;
                document.getElementById('switchAltValue').value = setting.altVal;
                document.getElementById('switchChannel').value = setting.ch;
            }
        }

        function loadEncoderSettings() {
            const index = document.getElementById('encoderSelect').value;
            const setting = currentSettings.encoderSettings[index];
            if (setting) {
                document.getElementById('encoderMode').value = setting.mode;
                document.getElementById('encoderLeftCc').value = setting.left_cc;
                document.getElementById('encoderLeftVal').value = setting.left_val;
                document.getElementById('encoderLeftCh').value = setting.left_ch;
                document.getElementById('encoderRightCc').value = setting.right_cc;
                document.getElementById('encoderRightVal').value = setting.right_val;
                document.getElementById('encoderRightCh').value = setting.right_ch;
                document.getElementById('encoderRangeMin').value = setting.rangeMin;
                document.getElementById('encoderRangeMax').value = setting.rangeMax;
                document.getElementById('encoderCurrentValue').value = setting.currentValue;
                document.getElementById('encoderSingleModeSteps').value = setting.singleModeSteps;
                document.getElementById('encoderAcceleration').value = setting.acceleration;
            }
        }

        async function saveAllSettings() {
            // Update currentSettings object from form
            currentSettings.wifi.enabled = document.getElementById('wifiEnable').checked;
            currentSettings.wifi.ssid = document.getElementById('ssid').value;
            currentSettings.wifi.pass = document.getElementById('password').value; // Include password only when saving
            
            // Switches
            for (let i = 0; i < 5; i++) {
                const select = document.getElementById('switchSelect');
                select.value = i; // Temporarily select each switch to get its values
                const setting = currentSettings.switchConfigs[i];
                setting.mode = document.getElementById('switchMode').value;
                setting.cc = parseInt(document.getElementById('switchCc').value);
                setting.val = parseInt(document.getElementById('switchValue').value);
                setting.altVal = parseInt(document.getElementById('switchAltValue').value);
                setting.ch = parseInt(document.getElementById('switchChannel').value);
            }
            select.value = 0; // Reset to first switch after saving all

            // Encoders
            for (let i = 0; i < 5; i++) {
                const select = document.getElementById('encoderSelect');
                select.value = i; // Temporarily select each encoder to get its values
                const setting = currentSettings.encoderSettings[i];
                setting.mode = document.getElementById('encoderMode').value;
                setting.left_cc = parseInt(document.getElementById('encoderLeftCc').value);
                setting.left_val = parseInt(document.getElementById('encoderLeftVal').value);
                setting.left_ch = parseInt(document.getElementById('encoderLeftCh').value);
                setting.right_cc = parseInt(document.getElementById('encoderRightCc').value);
                setting.right_val = parseInt(document.getElementById('encoderRightVal').value);
                setting.right_ch = parseInt(document.getElementById('encoderRightCh').value);
                setting.rangeMin = parseInt(document.getElementById('encoderRangeMin').value);
                setting.rangeMax = parseInt(document.getElementById('encoderRangeMax').value);
                setting.currentValue = parseInt(document.getElementById('encoderCurrentValue').value);
                setting.singleModeSteps = parseInt(document.getElementById('encoderSingleModeSteps').value);
                setting.acceleration = parseInt(document.getElementById('encoderAcceleration').value);
            }
            select.value = 0; // Reset to first encoder after saving all
            
            const response = await fetch('/updateSettings', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(currentSettings)
            });
            const result = await response.text();
            alert(result);
            fetchSettings(); // Re-fetch to get updated status/IP etc.
        }

        async function scanWifi() {
            const response = await fetch('/scanWifi');
            const networks = await response.json();
            const wifiListDiv = document.getElementById('wifiList');
            wifiListDiv.innerHTML = '';
            networks.forEach(net => {
                const item = document.createElement('div');
                item.className = 'wifi-item';
                item.innerText = `${net.ssid} (RSSI: ${net.rssi}, Enc: ${net.encryption})`;
                item.onclick = () => {
                    document.getElementById('ssid').value = net.ssid;
                    // Clear password field for new selection
                    document.getElementById('password').value = ''; 
                    // Remove previous selections
                    Array.from(wifiListDiv.children).forEach(child => child.classList.remove('selected'));
                    item.classList.add('selected');
                };
                wifiListDiv.appendChild(item);
            });
        }

        async function connectWifi() {
            const ssid = document.getElementById('ssid').value;
            const password = document.getElementById('password').value;
            if (!ssid) {
                alert("Please enter an SSID.");
                return;
            }
            const response = await fetch('/connectWifi', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `ssid=${encodeURIComponent(ssid)}&password=${encodeURIComponent(password)}`
            });
            const result = await response.text();
            alert(result);
            fetchSettings();
        }

        async function disconnectWifi() {
            const response = await fetch('/disconnectWifi', {
                method: 'POST'
            });
            const result = await response.text();
            alert(result);
            fetchSettings();
        }

        // Initial load
        document.addEventListener('DOMContentLoaded', fetchSettings);
    </script>
</body>
</html>
